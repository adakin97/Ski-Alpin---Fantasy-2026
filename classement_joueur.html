<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ski Alpin Fantasy 2026</title>

  <!-- Police Montserrat -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&display=swap" rel="stylesheet" />

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

  <style>
    :root {
      --main-red: #c62828; 
      --dark-bg: #1a1a1a;
      --light-bg: #f8f8f8;
      --hover-gray: #ddd;
      --white: #ffffff;
      --shadow-color: rgba(0, 0, 0, 0.18);
      --font-primary: 'Montserrat', sans-serif;
    }

    body {
      margin: 0;
      font-family: var(--font-primary);
      background: linear-gradient(to bottom right, #ffffff, #f0f0f0);
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---------- TOP BAR ---------- */
    /* ---------- TOP BAR 1 ---------- */
    .topbar1 {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      position: sticky;
      top: 0;
      z-index: 150;
      padding: 0.75rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--main-red);
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: default;
      user-select: none;
    }
    .logo i { font-size: 1.6rem; }
    .auth-links { display: flex; gap: 0.8rem; align-items: center; }
    .auth-links a {
      font-weight: 700;
      color: #333;
      text-decoration: none;
      padding: 7px 14px;
      border: 1.5px solid #ccc;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      font-family: var(--font-primary);
      white-space: nowrap;
    }
    .auth-links a:hover { border-color: var(--main-red); color: var(--main-red); }
    /* ---------- TOP BAR 2 ---------- */
    .topbar2 {
      background-color: var(--dark-bg);
      border-bottom: 3px solid var(--main-red);
      position: sticky;
      top: 56px;
      z-index: 140;
      display: flex;
      justify-content: center;
      user-select: none;
      overflow-x: auto;
    }
    .topbar2 > nav {
      display: flex;
      justify-content: center;
      flex-wrap: nowrap;
      padding: 0;
    }
    .topbar2 > nav > a {
      color: #bbb;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      padding: 13px 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      position: relative;
      top: 3px;
      transition: color 0.2s ease, border-bottom-color 0.2s ease;
    }
    .topbar2 > nav > a i { font-size: 0.85rem; }
    .topbar2 > nav > a:hover,
    .topbar2 > nav > a:focus {
      color: #fff;
      border-bottom-color: var(--main-red);
      outline: none;
    }
    .topbar2 > nav > a.active {
      color: #fff;
      border-bottom-color: var(--main-red);
    }


    /* ---------- CONTENU CLASSEMENT ---------- */
    .container {
      max-width: 800px;
      margin: 3rem auto;
      background: #fff;
      padding: 1.5rem 2rem;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    .container h1 {
      text-align: center;
      color: #e50914;
      font-size: 2rem;
      margin-bottom: 1.5rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 1rem;
      table-layout: fixed;
    }

    th, td {
      padding: 10px 12px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }

    th {
      background-color: #e50914;
      color: white;
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    tr:nth-child(even) { background-color: #f9f9f9; }

    tr.top-1 td { background: gold !important; color: #000; font-weight: 700; }
    tr.top-2 td { background: silver !important; color: #000; font-weight: 700; }
    tr.top-3 td { background: #cd7f32 !important; color: #000; font-weight: 700; }

    footer {
      margin-top: auto;
      background-color: var(--dark-bg);
      color: #bbb;
      text-align: center;
      padding: 22px 0;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      table, thead, tbody, th, td, tr {
        display: block;
      }
      thead { display: none; }
      td::before {
        content: attr(data-label);
        font-weight: bold;
        color: #e50914;
        display: block;
      }
    }
  </style>
</head>

<body>
  <!-- Barre du haut -->
  <header class="topbar1">
    <div class="logo"><i class="fas fa-mountain"></i> Ski Alpin Fantasy 2026</div>
    <nav id="nav-auth">
      <div class="auth-links">
        <a href="index.html" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Connexion</a>
        <a href="#" id="logoutBtn" style="display: none;"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
      </div>
    </nav>
  </header>

  <!-- Barre de navigation -->
  <nav class="topbar2">
    <nav>
      <a href="index.html"><i class="fas fa-home"></i> Accueil</a>
      <a href="classement_skieurs.html"><i class="fas fa-chart-line"></i> Classements Skieurs</a>
      <a href="classement_joueur.html" class="active"><i class="fas fa-users"></i> Classements Joueurs</a>
      <a href="Mon_equipe.html"><i class="fas fa-user"></i> Mon Équipe</a>
      <a href="rules.html"><i class="fas fa-book"></i> Règles</a>
      <a href="about.html"><i class="fas fa-info-circle"></i> À propos</a>
    </nav>
  </nav>

  <!-- Conteneur principal -->
  <div class="container">
    <h1><i class="fas fa-trophy"></i> Classement des Joueurs</h1>
    <table>
      <thead>
        <tr>
          <th>Rang</th>
          <th>Nom d'utilisateur</th>
          <th>Points</th>
        </tr>
      </thead>
      <tbody id="ranking-table">
        <tr><td colspan="3">Chargement du classement...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Pied de page -->
  <footer>
    &copy; 2026 Ski Alpin Fantasy. Tous droits réservés.
  </footer>

  <script type="module">
    import "./auth.js";
    import { db } from "./firebase.js";
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    const tableBody = document.getElementById("ranking-table");

    async function displayRanking() {
      try {
        const snapshot = await getDocs(collection(db, "teams")); // 🔹 collection correcte
        const users = [];

        snapshot.forEach(doc => {
          const data = doc.data();
          users.push({
            username: data.username || "Anonyme",
            points: data.totalPoints || 0
          });
        });

        users.sort((a, b) => b.points - a.points);

        tableBody.innerHTML = "";
        if (users.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="3">Aucune donnée disponible</td></tr>`;
          return;
        }

        users.forEach((user, index) => {
          let topClass = "";
          if (index === 0) topClass = "top-1";
          else if (index === 1) topClass = "top-2";
          else if (index === 2) topClass = "top-3";

          const row = `
            <tr class="${topClass}">
              <td data-label="Rang" class="rank">#${index + 1}</td>
              <td data-label="Nom">${user.username}</td>
              <td data-label="Points">${user.points}</td>
            </tr>
          `;
          tableBody.innerHTML += row;
        });
      } catch (error) {
        console.error("Erreur Firestore :", error);
        tableBody.innerHTML = `<tr><td colspan="3">Erreur lors du chargement du classement.</td></tr>`;
      }
    }

    displayRanking();
  </script>
</body>
</html>
