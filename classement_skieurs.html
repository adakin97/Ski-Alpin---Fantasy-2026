<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Classements Skieurs - Ski Alpin Fantasy</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="common.css">
  <style>
    /* HERO */
    .hero {
      padding: 60px 4rem 50px;
      background:
        linear-gradient(rgba(0,0,0,0.72), rgba(0,0,0,0.72)),
        url('Image/background_title.jpeg') center/cover no-repeat;
      color: #fff;
      border-left: 5px solid var(--main-red);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
    }
    .hero h1 {
      font-size: 3rem;
      font-weight: 900;
      margin: 0 0 0.4rem;
      text-shadow: 2px 2px 10px #000000cc;
    }
    .hero p {
      font-size: 1.05rem;
      color: #f0f0f0dd;
      margin: 0;
      font-weight: 500;
    }

    /* PAGE LAYOUT */
    .page-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px 60px;
      width: 100%;
    }

    /* TOOLBAR */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .toolbar label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #555;
      white-space: nowrap;
    }
    #rankingSelect {
      padding: 10px 36px 10px 14px;
      border: 1.5px solid #e0e0e0;
      font-size: 0.88rem;
      font-family: var(--font-primary);
      font-weight: 700;
      background: #fff;
      outline: none;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg fill='%23555' height='18' viewBox='0 0 24 24' width='18' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M7 10l5 5 5-5z'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 10px center;
      transition: border-color 0.2s;
    }
    #rankingSelect:focus { border-color: var(--main-red); }

    /* TABLE */
    .table-wrap {
      border: 1px solid #e2e2e2;
      background: #fff;
      overflow-x: auto;
    }
    #classement-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 360px;
    }
    #classement-table thead th {
      background: #1a1a1a;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 13px 20px;
      text-align: left;
    }
    #classement-table td {
      padding: 12px 20px;
      font-size: 0.92rem;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
    }
    #classement-table tbody tr:last-child td { border-bottom: none; }
    #classement-table tbody tr:hover td { background: #fff5f5; }

    .rank-num {
      font-weight: 800;
      color: #1a1a1a;
    }

    /* VOIR PLUS */
    .voir-plus-wrap {
      text-align: right;
      margin-top: 16px;
    }
    #voirPlusBtn {
      background: var(--main-red);
      color: #fff;
      border: none;
      padding: 10px 24px;
      font-weight: 800;
      font-size: 0.78rem;
      font-family: var(--font-primary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.2s;
      display: none;
    }
    #voirPlusBtn:hover { background: #a31f1f; }

    @media (max-width: 768px) {
      .hero { padding: 40px 1.5rem 36px; }
      .hero h1 { font-size: 2.2rem; }
      .page-content { padding: 24px 16px 40px; }
      .toolbar { flex-direction: column; align-items: flex-start; }
      #rankingSelect { width: 100%; }
    }
  </style>
</head>
<body>

<header class="topbar1" role="banner">
  <div class="logo"><i class="fas fa-mountain"></i> Ski Alpin Fantasy 2026</div>
  <nav id="nav-auth">
    <div class="auth-links">
      <a href="#" id="openLogin"><i class="fas fa-sign-in-alt"></i> Connexion</a>
      <a href="#" id="openSignup"><i class="fas fa-user-plus"></i> Inscription</a>
    </div>
  </nav>
</header>

<nav class="topbar2" role="navigation">
  <nav>
    <a href="index.html"><i class="fas fa-home"></i> Accueil</a>
    <a href="classement_skieurs.html" class="active"><i class="fas fa-chart-line"></i> Classements Skieurs</a>
    <a href="classement_joueur.html"><i class="fas fa-users"></i> Classements Joueurs</a>
    <a href="Mon_equipe.html"><i class="fas fa-user"></i> Mon Équipe</a>
    <a href="rules.html"><i class="fas fa-book"></i> Règles</a>
    <a href="about.html"><i class="fas fa-info-circle"></i> À propos</a>
  </nav>
</nav>

<section class="hero">
  <h1><i class="fas fa-chart-line"></i> Classements Skieurs</h1>
  <p>Classements FIS officiels — saison 2025/26.</p>
</section>

<div class="page-content">
  <div class="toolbar">
    <label for="rankingSelect">Discipline</label>
    <select id="rankingSelect">
      <option value="general" selected>Classement Général</option>
      <option value="slalom">Slalom (SL)</option>
      <option value="giant-slalom">Giant Slalom (GS)</option>
      <option value="super-g">Super G (SG)</option>
      <option value="downhill">Downhill (DH)</option>
    </select>
  </div>

  <div class="table-wrap">
    <table id="classement-table">
      <thead>
        <tr>
          <th>Position</th>
          <th>Nom</th>
          <th>Points</th>
        </tr>
      </thead>
      <tbody id="rankingBody"></tbody>
    </table>
  </div>

  <div class="voir-plus-wrap">
    <button id="voirPlusBtn">Voir plus</button>
  </div>
</div>

<footer>
  &copy; 2026 Ski Alpin Fantasy. Tous droits réservés.
</footer>

<script type="module">
  import "./auth.js";

  const rankingMap = {
    "general": "classement_general.json",
    "slalom": "classement_sl.json",
    "giant-slalom": "classement_gs.json",
    "super-g": "classement_sg.json",
    "downhill": "classement_dh.json"
  };

  const rankingBody = document.getElementById("rankingBody");
  const rankingSelect = document.getElementById("rankingSelect");
  const voirPlusBtn = document.getElementById("voirPlusBtn");
  let classementActuel = [];
  let indexActuel = 0;
  const lignesParPage = 15;

  async function chargerClassement(discipline) {
    const fichier = rankingMap[discipline];
    if (!fichier) {
      rankingBody.innerHTML = "<tr><td colspan='3'>Classement indisponible</td></tr>";
      return;
    }
    try {
      const response = await fetch(fichier);
      if (!response.ok) throw new Error("Impossible de charger les données");
      const data = await response.json();
      rankingBody.innerHTML = "";
      if (data.length === 0) {
        rankingBody.innerHTML = "<tr><td colspan='3'>Aucune donnée disponible</td></tr>";
        return;
      }
      classementActuel = data;
      indexActuel = 0;
      afficherSkieurs();
      voirPlusBtn.style.display = data.length > lignesParPage ? "inline-block" : "none";
    } catch (error) {
      console.error("Erreur chargement JSON :", error);
      rankingBody.innerHTML = `<tr><td colspan="3">Erreur de chargement des données</td></tr>`;
    }
  }

  voirPlusBtn.addEventListener("click", afficherSkieurs);

  function afficherSkieurs() {
    for (let i = indexActuel; i < indexActuel + lignesParPage && i < classementActuel.length; i++) {
      const skieur = classementActuel[i];
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><span class="rank-num">${skieur.position}</span></td>
        <td>${skieur.nom}</td>
        <td>${skieur.points}</td>
      `;
      rankingBody.appendChild(tr);
    }
    indexActuel += lignesParPage;
    voirPlusBtn.style.display = indexActuel >= classementActuel.length ? "none" : "inline-block";
  }

  chargerClassement(rankingSelect.value);

  rankingSelect.addEventListener("change", () => {
    chargerClassement(rankingSelect.value);
  });
</script>

</body>
</html>
